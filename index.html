<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Officiel - Pink Paradise</title>
    <style>
        body {
            background-color: #ffeef8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #5a189a;
        }
        h1 {
            color: #ff4d6d;
            text-shadow: 2px 2px #ffffff;
            margin-bottom: 30px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.2);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        .btn {
            display: block;
            background: #ff4d6d;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
        }
        .btn:hover {
            background: #ff758f;
            transform: scale(1.03);
        }
        .btn-purple { background: #9d4edd; }
        .btn-purple:hover { background: #b07dff; }
        .btn-blue { background: #48cae4; }
        .btn-blue:hover { background: #90e0ef; }
        footer { margin-top: 20px; font-size: 0.8em; color: #ff85a1; }
    </style>
</head>
<body>

    <h1>🌸 Hub Pink Paradise 🌸</h1>

    <div class="container">
        <a href="https://pin-ia-paradise.lovable.app" class="btn">🎙️ Pin-IA-Paradise (Ai Hoshino)</a>
        <a href="https://inaya-relax.lovable.app" class="btn btn-purple">🧘‍♀️ Inaya-Relax</a>
        <a href="https://pink-kohlanta.lovable.app" class="btn btn-blue">🏝️ Pink Koh-Lanta</a>
        <a href="https://palmi-ai-noel.base44.app" class="btn">🎄 Palmi-AI Noël</a>
        <a href="https://pink-relax-calendrier.base44.app" class="btn btn-purple">📅 Calendrier Secret</a>
        <a href="https://webhooky.base44.app/login" class="btn btn-blue">⚙️ Webhooky (Base44)</a>
    </div>

    <footer>Propulsé par Palmi & le génie d'Elena ✨</footer>

</body>
</html>
